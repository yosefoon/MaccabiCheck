name: Check appointment

on:
  schedule:
    # כל 5 דקות, בדקות מוזחות — דקות עגולות (:00/:30) עמוסות במתזמן של GitHub.
    # בפועל GitHub מריץ בטווח של ~5–15 דקות ולעיתים מדלג בשעות עומס.
    - cron: '4,9,14,19,24,29,34,39,44,49,54,59 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: appointment-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node check.mjs

      # קומיט של state.json רק כשמשהו מהותי השתנה (לא רק lastCheck), או פעם ביום —
      # הקומיט היומי שומר על הריפו פעיל כדי ש-GitHub לא ישבית את התזמון אחרי 60 יום.
      - name: Commit state if changed
        if: always()
        run: |
          if git diff --quiet -- state.json; then
            echo "state.json unchanged"
            exit 0
          fi
          MEANINGFUL=$(git diff -U0 -- state.json | grep -E '^[+-][[:space:]]*"' | grep -cv '"lastCheck"' || true)
          LAST_COMMIT_DAY=$(git log -1 --format=%cd --date=format:%Y-%m-%d -- state.json)
          TODAY=$(date -u +%Y-%m-%d)
          if [ "$MEANINGFUL" -gt 0 ] || [ "$LAST_COMMIT_DAY" != "$TODAY" ]; then
            git config user.name "appointment-bot"
            git config user.email "actions@users.noreply.github.com"
            git add state.json
            git commit -m "Update state ($TODAY)"
            git pull --rebase
            git push
          else
            echo "Only lastCheck changed and already committed today — skipping commit"
          fi
